version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: gantt-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_HOST=0.0.0.0

    command: npm run dev -- --host 0.0.0.0 --port 5173

    restart: unless-stopped


  backend:
    build:
      context: ./backend
    container_name: gantt-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./backend/.env

    environment:
      - PYTHONUNBUFFERED=1

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: unless-stopped


networks:
  default:
    name: gantt-network